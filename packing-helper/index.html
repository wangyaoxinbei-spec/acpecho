<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行李助手 · PackSmart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🧳</span>
        <span class="logo-text">PackSmart</span>
      </div>
      <nav class="nav-tabs">
        <button class="nav-btn active" data-tab="items">物品管理</button>
        <button class="nav-btn" data-tab="checklist">打包清单</button>
        <button class="nav-btn" data-tab="ai">AI 整理方案</button>
      </nav>
      <button class="btn-primary" id="addItemBtn">+ 添加物品</button>
    </div>
  </header>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <!-- ── TAB 1: 物品管理 ── -->
    <section id="tab-items" class="tab-content active">
      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <span class="stat-num" id="stat-total">0</span>
          <span class="stat-label">物品总数</span>
        </div>
        <div class="stat-card purchased">
          <span class="stat-num" id="stat-purchased">0</span>
          <span class="stat-label">已购买</span>
        </div>
        <div class="stat-card pending">
          <span class="stat-num" id="stat-pending">0</span>
          <span class="stat-label">待购买</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="stat-packed">0</span>
          <span class="stat-label">已打包</span>
        </div>
      </div>

      <!-- Filter row -->
      <div class="filter-row">
        <div class="search-wrap">
          <input type="text" class="search-input" id="searchInput" placeholder="搜索物品…" />
        </div>
        <div class="filter-chips">
          <button class="chip active" data-filter="all">全部</button>
          <button class="chip" data-filter="purchased">已购买</button>
          <button class="chip" data-filter="pending">未购买</button>
        </div>
        <div class="category-filter">
          <select id="categoryFilter" class="select">
            <option value="all">所有分类</option>
            <option value="证件">证件</option>
            <option value="衣物">衣物</option>
            <option value="洗漱">洗漱</option>
            <option value="电子">电子</option>
            <option value="药品">药品</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>

      <!-- Items grid by category -->
      <div id="itemsGrid" class="items-grid"></div>
    </section>

    <!-- ── TAB 2: 打包清单 ── -->
    <section id="tab-checklist" class="tab-content">
      <div class="checklist-header">
        <div>
          <h2 class="section-title">打包清单</h2>
          <p class="section-sub">逐一确认每件物品已放入行李箱</p>
        </div>
        <div class="checklist-actions">
          <button class="btn-ghost" id="resetChecklist">重置</button>
          <button class="btn-primary" id="exportBtn">导出清单</button>
        </div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-info">
          <span id="checklistProgress">0 / 0 已核对</span>
          <span id="checklistPercent">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>
      <div id="checklistGroups" class="checklist-groups"></div>
    </section>

    <!-- ── TAB 3: AI 整理方案 ── -->
    <section id="tab-ai" class="tab-content">
      <div class="ai-header">
        <div>
          <h2 class="section-title">AI 智能整理方案</h2>
          <p class="section-sub">根据你的物品，生成最佳的行李箱装载策略</p>
        </div>
        <button class="btn-ai" id="generateAIBtn">
          <span class="ai-icon">✨</span> 生成方案
        </button>
      </div>
      <div id="aiResult" class="ai-result-area">
        <div class="ai-placeholder">
          <div class="ai-placeholder-icon">🤖</div>
          <p>点击「生成方案」，AI 将分析你的物品清单，<br/>给出最优的打包顺序和空间利用建议。</p>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== ADD / EDIT ITEM MODAL ===== -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">添加物品</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <label class="form-label">物品名称 *</label>
        <input type="text" class="form-input" id="itemName" placeholder="例：护照" />

        <label class="form-label">分类</label>
        <select class="form-input" id="itemCategory">
          <option value="证件">证件</option>
          <option value="衣物">衣物</option>
          <option value="洗漱">洗漱</option>
          <option value="电子">电子</option>
          <option value="药品">药品</option>
          <option value="其他">其他</option>
        </select>

        <label class="form-label">数量</label>
        <input type="number" class="form-input" id="itemQty" value="1" min="1" />

        <label class="form-label">备注</label>
        <input type="text" class="form-input" id="itemNote" placeholder="可选备注" />

        <label class="form-label">购买状态</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="purchaseStatus" value="purchased" id="statusPurchased" /> 已购买
          </label>
          <label class="radio-label">
            <input type="radio" name="purchaseStatus" value="pending" id="statusPending" checked /> 未购买
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" id="modalCancel">取消</button>
        <button class="btn-primary" id="modalSave">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast hidden" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
